# Configure Dependabot version updates
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "seabbs"
    assignees:
      - "seabbs"
    commit-message:
      prefix: "ci"
      include: "scope"

  # Enable version updates for Julia dependencies across the workspace
  # (main package, test/, docs/).
  - package-ecosystem: "julia"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "seabbs"
    assignees:
      - "seabbs"
    commit-message:
      prefix: "chore"
      include: "scope"
