# MANAGED by EpiAwarePackageTools.scaffold — do not edit by hand.
name: Benchmark

on:
  pull_request_target:
    branches: [main]
    paths:
      - 'src/**'
      - 'ext/**'
      - 'benchmark/**'
      - 'test/ADFixtures/**'

permissions:
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      # Full checkout: AirspeedVelocity's action reads the repo-root
      # `Project.toml` (to get the package name) and benchmarks `src/` +
      # `benchmark/`, so the working tree needs the whole package, not a
      # sparse slice.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # `benchmark/Project.toml` declares ADFixtures as a path source at
      # `../test/ADFixtures`. AirspeedVelocity runs `benchpkg`, which calls
      # `mktempdir()` (default `/tmp/`) and copies just
      # `benchmark/Project.toml` into that env. Pkg then resolves the
      # relative source path to `/tmp/test/ADFixtures` — which doesn't
      # exist, so the run aborts before any benchmarking. Staging
      # ADFixtures into `/tmp/test/` gives Pkg the path it expects without
      # touching the action or the project file. Guarded so a non-AD
      # package (no `test/ADFixtures`, no path source to stage) is a no-op.
      - name: Stage ADFixtures for AirspeedVelocity
        run: |
          if [ -d test/ADFixtures ]; then
            mkdir -p /tmp/test
            cp -r test/ADFixtures /tmp/test/ADFixtures
          fi

      # Run the suite (core + AD gradients). `job-summary: true` makes the
      # action write its flat table to the job summary instead of posting a
      # PR comment, so we can post a single legible comment ourselves below
      # from the same `results/` JSON it leaves behind (#290).
      - uses: MilesCranmer/AirspeedVelocity.jl@action-v1
        with:
          julia-version: '1'
          mode: 'time,memory'
          job-summary: true

      # Build a grouped, readable comment from the AirspeedVelocity result
      # JSON: a "most changed" summary, a compact AD scenario x backend
      # ratio matrix, and the full table folded away. The raw flat table
      # (every scenario x backend AD row) is otherwise unreadable.
      - name: Build benchmark comment
        run: |
          julia --project=benchmark/comment -e \
            'using Pkg; Pkg.instantiate()'
          julia --project=benchmark/comment benchmark/comment/comment.jl \
            results EpiAwarePackageTools \
            "${{ github.event.repository.default_branch }}" \
            "${{ github.event.pull_request.head.sha }}" \
            benchmark-comment.md

      - name: Post benchmark comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- benchmark-comment -->';
            const body = marker + '\n' +
              fs.readFileSync('benchmark-comment.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number });
            const existing = comments.find(
              c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment(
                { owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment(
                { owner, repo, issue_number, body });
            }
