name: Self-drift

# Dogfooding guard: the kit manages its OWN repo with its own tooling. This
# re-applies the managed standard files to the kit (`update(".", ad = false)` —
# the kit is a tooling package with no differentiable code, so it opts out of
# the AD infra) and fails if the working tree changed (tracked OR untracked, so
# a newly added managed template that was not committed is caught too). A
# non-empty result means the committed infra has drifted from the bundled
# templates, so the kit no longer keeps itself to the standard it ships.
#
# `update` preserves the reusable-workflow refs Dependabot pins (see
# `_preserve_reusable_refs`), so a Dependabot SHA bump never trips this check.
# The scheduled `template-sync` workflow is the proactive other half: it opens a
# PR when drift appears between commits.

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  self-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - uses: julia-actions/cache@v3
      - name: Re-apply the managed standard to the kit itself
        run: julia --project=. -e '
          using Pkg; Pkg.instantiate();
          using EpiAwarePackageTools;
          res = update("."; ad = false);
          println("re-applied ", length(res.updated), " managed files");'
      - name: Fail on any drift from the bundled templates
        # `update` never rewrites LICENSE (it is package-owned, write-once), so
        # it cannot drift here; the explicit exclude keeps that guarantee clear.
        # `git status --porcelain` reports tracked changes AND untracked files,
        # so a newly added managed template that was not committed also fails.
        run: |
          changes=$(git status --porcelain -- . ':!LICENSE')
          if [ -n "$changes" ]; then
            echo "::error::The kit has drifted from its own managed templates."
            echo "Run julia -e 'using EpiAwarePackageTools; update(\".\"; ad=false)' and commit."
            echo "$changes"
            git --no-pager diff -- . ':!LICENSE'
            exit 1
          fi
          echo "No drift: the kit is in sync with the standard it ships."
