version: '3'

# Standard EpiAware package development tasks. Generalised from
# CensoredDistributions.jl; package-specific assumptions (a particular
# extension, a fixed package name) are kept out so this drops into any package.
# A package can override `PACKAGE` below, otherwise it is read from Project.toml.
#
# This is the no-AD variant (the package opted out of the AD harness, so the
# AD test tasks and the AD env setup step are absent). See the AD-enabled
# Taskfile.yml template for the variant with AD tasks.

vars:
  PACKAGE:
    sh: julia --project=. -e 'using Pkg; print(Pkg.project().name)'

tasks:
  # Default task - show help
  default:
    desc: Show available tasks and common workflows
    cmds:
      - task: help

  # === TESTING WORKFLOWS ===
  test:
    desc: Run the full test suite including quality checks
    cmds:
      - echo "🧪 Running test suite..."
      - julia --project=. --quiet -e 'using Pkg; Pkg.test()'
      - echo "✅ All tests completed successfully"

  test-fast:
    desc: Run tests quickly (skip quality checks for development)
    cmds:
      - echo "🧪 Running fast test suite (skipping quality checks)..."
      - julia --project=. --quiet -e 'using Pkg; Pkg.test(test_args=["skip_quality"])'
      - echo "✅ Fast tests completed"

  test-quality:
    desc: Run only quality checks (Aqua, formatting, linting, doctests)
    cmds:
      - echo "🔍 Running quality checks only..."
      - julia --project=. --quiet -e 'using Pkg; Pkg.test(test_args=["quality_only"])'
      - echo "✅ Quality checks completed"

  test-jet:
    desc: Run JET static analysis directly (isolated environment)
    cmds:
      - echo "🔍 Running JET static analysis..."
      - julia --project=test/jet -e 'using Pkg; Pkg.instantiate()'
      - julia --project=test/jet test/jet/runtests.jl
      - echo "✅ JET analysis completed"

  test-formatting:
    desc: Run the JuliaFormatter check directly (isolated environment)
    cmds:
      - echo "🎨 Checking code formatting..."
      - julia --project=test/formatter -e 'using Pkg; Pkg.instantiate()'
      - julia --project=test/formatter test/formatter/runtests.jl
      - echo "✅ Formatting check completed"

  format:
    desc: Format code with JuliaFormatter (fixes formatting issues)
    cmds:
      - echo "🎨 Formatting code with JuliaFormatter..."
      - julia --project=test/formatter -e 'using Pkg; Pkg.instantiate()' 2>/dev/null
      - julia --project=test/formatter --quiet -e 'using JuliaFormatter; for d in ("src", "test", "docs", "benchmark"); isdir(d) && format(d; verbose=false, overwrite=true); end'
      - echo "✅ Code formatting completed"

  coverage:
    desc: Run tests with coverage and generate an lcov report
    cmds:
      - echo "📊 Running tests with coverage..."
      - julia --project=. --code-coverage=user -e 'using Pkg; Pkg.test(test_args=["skip_quality"])'
      - echo "📊 Processing coverage data..."
      - julia --project=test -e 'using Pkg; Pkg.add("Coverage"); using Coverage; LCOV.writefile("lcov.info", process_folder())'
      - echo "✅ Coverage report generated (lcov.info)"

  # === DOCUMENTATION WORKFLOWS ===
  docs:
    desc: Build the documentation
    cmds:
      - echo "📚 Building documentation..."
      - julia --project=docs docs/make.jl
      - echo "✅ Documentation built successfully"

  # === DEVELOPMENT SETUP ===
  setup:
    desc: Set up the development environment from scratch
    cmds:
      - echo "🛠️  Setting up development environment..."
      - julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - julia --project=test -e 'using Pkg; Pkg.instantiate()'
      - >-
        for d in test/jet test/formatter docs benchmark; do
          [ -f "$d/Project.toml" ] &&
            julia --project="$d" -e 'using Pkg; Pkg.instantiate()' || true;
        done  # the AD env is absent in the no-AD variant
      - echo "✅ Development environment ready"

  # === PACKAGE MANAGEMENT ===
  pkg-status:
    desc: Show package status for the root and test environments
    cmds:
      - echo "📦 Package status overview:"
      - echo "=== Root Environment ==="
      - julia --project=. --quiet -e 'using Pkg; Pkg.status()'
      - echo "=== Test Environment ==="
      - julia --project=test --quiet -e 'using Pkg; Pkg.status()'

  # === BENCHMARKS ===
  benchmark:
    desc: "Run benchmarks (usage: task benchmark -- --filter=Foo)"
    cmds:
      - echo "⚡ Running benchmarks..."
      - ~/.julia/bin/benchpkg --rev=dirty --path="$(git rev-parse --show-toplevel)" --script="$(pwd)/benchmark/benchmarks.jl" {{.CLI_ARGS}}

  benchmark-compare:
    desc: "Compare main vs current (usage: task benchmark-compare -- --filter=Foo)"
    cmds:
      - echo "⚡ Comparing benchmarks (main vs current)..."
      - ~/.julia/bin/benchpkg --rev=main,dirty --path="$(git rev-parse --show-toplevel)" --script="$(pwd)/benchmark/benchmarks.jl" {{.CLI_ARGS}}

  benchmark-install:
    desc: Install the benchpkg CLI to the global environment (one-time)
    cmds:
      - julia -e 'using Pkg; Pkg.add("AirspeedVelocity")'
      - echo "✅ benchpkg installed to ~/.julia/bin"

  # === DEVELOPMENT WORKFLOWS ===
  dev:
    desc: Common development workflow (format + precommit + fast test)
    cmds:
      - task: format
      - task: precommit
      - task: test-fast
      - echo "✅ Development checks completed"

  precommit:
    desc: Run the pre-commit hooks on all files
    cmds:
      - echo "🎨 Running pre-commit hooks..."
      - pre-commit run --all-files
      - echo "✅ Pre-commit completed"

  ci:
    desc: Simulate the CI pipeline locally
    cmds:
      - task: precommit
      - task: test
      - task: docs
      - echo "✅ CI simulation completed successfully"

  # === INFORMATION ===
  info:
    desc: Show project information and environment status
    cmds:
      - 'julia --project=. -e ''using Pkg; println("Julia version: ", VERSION); p = Pkg.project(); println("Package: ", p.name, " v", p.version)'''
      - task: pkg-status

  help:
    desc: Show available commands
    cmds:
      - task --list
